server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets aggressively (hash-named by Vite).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every route not matching a file falls to index.html.
    # Critical for React Router / our /c/:token short-URL path handled
    # client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }
}