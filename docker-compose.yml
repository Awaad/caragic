version: '3.8'

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5174:5173"
    volumes:
      - ./client:/app          # mount source code
      - /app/node_modules        # keep container's node_modules intact
    environment:
      - CHOKIDAR_USEPOLLING=true # enables file watching on Windows
    